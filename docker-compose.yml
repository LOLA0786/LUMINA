version: '3.8'
services:
  neo4j:
    image: neo4j:5.26
    container_name: lumina-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/supersecret123   # ← CHANGE THIS
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
    volumes:
      - neo4j-data:/data
volumes:
  neo4j-data:
